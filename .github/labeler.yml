#labeler schema

# enable labeler on issues and prs
enable:
  issue: true
  prs: true

comments:
  issues: |
    Thanks for opening this issue! 
    Please make sure you have provided the following information so we can help you better.
  prs: |
    Thanks for opening this pull request!
    Please make sure you have provided the following information so we can help you better.

# labels to add to issues and prs
labels:
  "bug":
    include:
      - '\bbug[s]?\b'
    exclude: []
  "help wanted":
    include:
      - '\bhelp( me)?\b'
    exclude:
      - '\b\[test(ing)?\]\b'
  "enhancement":
    include:
      - '\bfeat\b'
    exclude: []
